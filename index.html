

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  background: transparent;
  text-align: center;
}

/* 全体 */
.ui {
  position: relative;
  width: 100%;
  max-width: 900px;
  margin: 0 auto;
}

.bg {
  width: 100%;
  display: block;
}

/* スロット位置（スマホ対応） */
.slot {
  position: absolute;
  top: 32%;
  left: 16%;
  display: flex;
  gap: 10%;
}

/* リール */
.reel {
  width: 20vw;
  height: 20vw;
  max-width: 150px;
  max-height: 150px;
  overflow: hidden;
  background: white;
}

/* 中身 */
.reel-inner {
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* 画像 */
.reel-inner img {
  width: 100%;
  height: 150px;   /* ←固定にする */
  object-fit: contain;
}

/* 回転 */
.spin {
  animation: spin 0.08s linear infinite;
}

@keyframes spin {
  0% { transform: translateY(0); }
  100% { transform: translateY(-100%); }
}

/* ボタン */
.spin-btn {
  position: absolute;
  top: 60%;
  left: 50%;
  transform: translateX(-50%);
  width: 50%;
  max-width: 300px;
}

/* 紙吹雪 */
#confetti {
  position: absolute;
  top: 0;
  left: 0;
  pointer-events: none;
}
</style>
</head>

<body>

<div class="ui">
  <img src="ui.png" class="bg">

  <div class="slot">
    <div class="reel"><div id="r1"></div></div>
    <div class="reel"><div id="r2"></div></div>
    <div class="reel"><div id="r3"></div></div>
  </div>

  <!-- ボタン -->
  <img src="button.png" class="spin-btn" onclick="spinSlot()">

  <canvas id="confetti"></canvas>
</div>

<audio id="spinSE" src="spin_full.mp3"></audio>
<audio id="winSE" src="bgm2.mp3"></audio>

<script>
const images = [
  "face1.png","face2.png","face3.png",
  "face4.png","face5.png","face6.png"
];

const jackpotIndex = 2;

let spinning = false;
let results = [];

/* リール生成 */
function createReel(){
  let html = "";
  for(let i=0;i<10;i++){
    const rand = Math.floor(Math.random()*images.length);
    html += `<img src="${images[rand]}">`;
  }
  return html;
}

/* 初期表示 */
["r1","r2","r3"].forEach(id=>{
  document.getElementById(id).innerHTML =
    `<div class="reel-inner">${createReel()}</div>`;
});

/* 回す */
function spinSlot(){
  if(spinning) return;
  spinning = true;
  results = [];

  document.getElementById("spinSE").play();

  ["r1","r2","r3"].forEach(id=>{
    const reel = document.getElementById(id);

    reel.innerHTML = `<div class="reel-inner">${createReel()}</div>`;
    reel.querySelector(".reel-inner").classList.add("spin");
  });

  setTimeout(()=>stopReel("r1"), 3000);
  setTimeout(()=>stopReel("r2"), 3500);
  setTimeout(()=>stopReel("r3"), 4200);
}

/* 停止 */
function stopReel(id){
  const reel = document.getElementById(id);
  const inner = reel.querySelector(".reel-inner");

  inner.classList.remove("spin");

  let rand = Math.random();
  let index;

  if(rand < 0.04){
    index = jackpotIndex;
  }
  else if(rand < 0.12){
    index = Math.floor(Math.random()*images.length);
    if(index === jackpotIndex){
      index = (index + 1) % images.length;
    }
  }
  else{
    index = Math.floor(Math.random()*images.length);
  }

  results.push(index);

  reel.innerHTML = `
    <div class="reel-inner">
      <img src="${images[index]}">
      <img src="${images[index]}">
      <img src="${images[index]}">
    </div>
  `;

  if(results.length === 3){
    setTimeout(()=>{
      checkWin();
      spinning = false;
    }, 200);
  }
}

/* 紙吹雪 */
function showConfetti(){
  const canvas = document.getElementById("confetti");
  const ctx = canvas.getContext("2d");

  canvas.width = window.innerWidth;
  canvas.height = 300;

  let pieces = [];

  for(let i=0;i<80;i++){
    pieces.push({
      x: Math.random()*canvas.width,
      y: Math.random()*canvas.height,
      size: Math.random()*6+4,
      speed: Math.random()*3+2
    });
  }

  let frame = 0;

  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    pieces.forEach(p=>{
      ctx.fillStyle = `hsl(${Math.random()*360},100%,50%)`;
      ctx.fillRect(p.x,p.y,p.size,p.size);
      p.y += p.speed;
    });

    frame++;
    if(frame < 60){
      requestAnimationFrame(draw);
    }
  }

  draw();
}

/* 判定 */
function checkWin(){
  if(results[0] === results[1] && results[1] === results[2]){

    if(results[0] === jackpotIndex){
      document.getElementById("winSE").play();
    } else {
      showConfetti();
    }
  }
}
</script>

</body>
</html>
