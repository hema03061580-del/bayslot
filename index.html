<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  background: transparent;
  text-align: center;
}

.ui {
  position: relative;
  max-width: 900px;
  margin: 0 auto;
}

.bg { width: 100%; }

/* ロゴ */
.logo {
  position: absolute;
  top: -20%;
  left: 50%;
  transform: translateX(-50%);
  width: 95%;
}

/* スロット */
.slot {
  position: absolute;
  top: 37%;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 4px;
}

/* リール */
.reel {
  width: 95px;
  height: 70px; /* 少し余裕 */
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}

.reel-inner {
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* 🔥 ここ修正（潰れ防止） */
.reel-inner img {
  width: auto;
  height: 60px;
  object-fit: contain;
}

/* 回転 */
.spin {
  animation: spin 0.08s linear infinite;
}

@keyframes spin {
  0% { transform: translateY(0); }
  100% { transform: translateY(-60px); }
}

/* ボタン */
.spin-btn {
  position: absolute;
  top: 85%;
  left: 50%;
  transform: translateX(-50%);
  width: 60%;
}

/* 紙吹雪 */
#confetti {
  position: absolute;
  top: 0;
  left: 0;
  pointer-events: none;
}
</style>
</head>

<body>

<div class="ui">
  <img src="ui.png" class="bg">
  <img src="logo.png" class="logo">

  <div class="slot">
    <div class="reel"><div id="r1"></div></div>
    <div class="reel"><div id="r2"></div></div>
    <div class="reel"><div id="r3"></div></div>
  </div>

  <img src="button.png" onclick="spinSlot()" class="spin-btn">

  <canvas id="confetti"></canvas>
</div>

<script>
const images = [
  "face1.png","face2.png","face3.png",
  "face4.png","face5.png","face6.png"
];

let spinning = false;
let results = [];
let resultType = "";
let fixedIndex = 0;

/* 🔥 音（グローバル保持） */
let bgm1 = new Audio("bgm1.mp3");
let bgm2 = new Audio("bgm2.MP3");
let spinFull = new Audio("spin_full.mp3");

/* 🔥 音解放（超重要） */
function unlockAudio(){
  [bgm1,bgm2,spinFull].forEach(a=>{
    a.play().then(()=>a.pause()).catch(()=>{});
    a.currentTime = 0;
  });
}
document.body.addEventListener("touchstart", unlockAudio, { once: true });

/* 再生 */
function playSpin(){
  spinFull.currentTime = 0;
  spinFull.play().catch(()=>{});
}

function playBGM(type){
  bgm1.pause();
  bgm2.pause();

  if(type === "normal"){
    bgm1.currentTime = 0;
    bgm1.play().catch(()=>{});
  }
  else if(type === "jackpot"){
    bgm2.currentTime = 0;
    bgm2.play().catch(()=>{});
  }
}

/* 初期表示 */
["r1","r2","r3"].forEach(id=>{
  const i = Math.floor(Math.random()*images.length);
  document.getElementById(id).innerHTML = `
    <div class="reel-inner">
      <img src="${images[i]}">
      <img src="${images[i]}">
      <img src="${images[i]}">
    </div>
  `;
});

/* リール */
function createReel(){
  let html = "";
  for(let i=0;i<10;i++){
    html += `<img src="${images[Math.floor(Math.random()*images.length)]}">`;
  }
  return html;
}

/* 回す */
function spinSlot(){
  if(spinning) return;

  spinning = true;
  results = [];

  let rand = Math.random();

  if(rand < 0.1){
    resultType = "jackpot";
  }
  else if(rand < 0.3){
    resultType = "normal";
  }
  else{
    resultType = "lose";
  }

  if(resultType !== "lose"){
    fixedIndex = Math.floor(Math.random()*images.length);
  }

  playSpin();

  setTimeout(()=>{
    ["r1","r2","r3"].forEach(id=>{
      document.getElementById(id).innerHTML = `
        <div class="reel-inner spin">
          ${createReel()}
        </div>
      `;
    });
  },200);

  setTimeout(()=>stopReel("r1"), 3000);
  setTimeout(()=>stopReel("r2"), 3500);
  setTimeout(()=>stopReel("r3"), 4200);
}

/* 停止 */
function stopReel(id){
  let index;

  if(resultType === "lose"){
    index = Math.floor(Math.random()*images.length);
  } else {
    index = fixedIndex;
  }

  results.push(index);

  document.getElementById(id).innerHTML = `
    <div class="reel-inner">
      <img src="${images[index]}">
      <img src="${images[index]}">
      <img src="${images[index]}">
    </div>
  `;

  if(results.length === 3){
    setTimeout(()=>{
      spinning = false;

      // 🔥 確実に鳴る位置
      checkWin();

    },500);
  }
}

/* 判定 */
function checkWin(){
  if(resultType === "jackpot"){
    playBGM("jackpot");
    showConfetti(150);
  }
  else if(resultType === "normal"){
    playBGM("normal");
    showConfetti(80);
  }
}

/* 紙吹雪 */
function showConfetti(amount){
  const canvas = document.getElementById("confetti");
  const ctx = canvas.getContext("2d");

  canvas.width = window.innerWidth;
  canvas.height = 200;

  let pieces = [];

  for(let i=0;i<amount;i++){
    pieces.push({
      x: Math.random()*canvas.width,
      y: Math.random()*canvas.height,
      size: Math.random()*6+4,
      speed: Math.random()*3+2
    });
  }

  let frame = 0;

  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    pieces.forEach(p=>{
      ctx.fillStyle = `hsl(${Math.random()*360},100%,50%)`;
      ctx.fillRect(p.x,p.y,p.size,p.size);
      p.y += p.speed;
    });

    frame++;

    if(frame < 60){
      requestAnimationFrame(draw);
    }
  }

  draw();
}
</script>

</body>
</html>
