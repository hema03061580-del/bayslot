<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  background: transparent;
  text-align: center;
}

/* 全体 */
.ui {
  position: relative;
  width: 100%;
  max-width: 900px;
  margin: 0 auto;
}

.bg {
  width: 100%;
}

/* ✅ ロゴ（大きく＆上） */
.logo {
  position: absolute;
  top: -14%;
  left: 50%;
  transform: translateX(-50%);
  width: 85%;
  max-width: 560px;
  z-index: 2;
}

/* スロット */
.slot {
  position: absolute;
  top: 40%;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 6%;
}

/* リール */
.reel {
  width: 110px;
  height: 90px;
  overflow: hidden;
  background: white;
  display: flex;
  justify-content: center;
}

/* ✅ 中央固定（ズレ完全防止） */
.reel-inner {
  display: flex;
  flex-direction: column;
  align-items: center;
  transform: translateY(-65px);
}

/* ✅ 画像（最適サイズ） */
.reel-inner img {
  width: 65px;
  height: 65px;
  object-fit: contain;
}

/* 回転 */
.spin {
  animation: spin 0.1s linear infinite;
}

@keyframes spin {
  0% { transform: translateY(-65px); }
  100% { transform: translateY(-130px); }
}

/* ボタン */
.spin-btn {
  position: absolute;
  top: 68%;
  left: 50%;
  transform: translateX(-50%);
  width: 55%;
  max-width: 320px;
}
</style>
</head>

<body>

<div class="ui">
  <img src="ui.png" class="bg">
  <img src="logo.png" class="logo">

  <div class="slot">
    <div class="reel"><div id="r1"></div></div>
    <div class="reel"><div id="r2"></div></div>
    <div class="reel"><div id="r3"></div></div>
  </div>

  <img src="button.png" class="spin-btn" onclick="spinSlot()">
</div>

<audio id="spinSE" src="spin_full.mp3"></audio>

<script>
const images = [
  "face1.png","face2.png","face3.png",
  "face4.png","face5.png","face6.png"
];

let spinning = false;

/* 初期表示（中央固定） */
["r1","r2","r3"].forEach(id=>{
  const reel = document.getElementById(id);
  const index = Math.floor(Math.random()*images.length);

  reel.innerHTML = `
    <div class="reel-inner">
      <img src="${images[index]}">
      <img src="${images[index]}">
      <img src="${images[index]}">
    </div>
  `;
});

/* 回す */
function spinSlot(){
  if(spinning) return;
  spinning = true;

  document.getElementById("spinSE").play();

  ["r1","r2","r3"].forEach(id=>{
    const reel = document.getElementById(id);

    reel.innerHTML = `
      <div class="reel-inner spin">
        ${createReel()}
      </div>
    `;
  });

  /* 順番停止 */
  setTimeout(()=>stopReel("r1"), 3000);
  setTimeout(()=>stopReel("r2"), 3500);
  setTimeout(()=>stopReel("r3"), 4200);
}

/* リール生成 */
function createReel(){
  let html = "";
  for(let i=0;i<10;i++){
    const rand = Math.floor(Math.random()*images.length);
    html += `<img src="${images[rand]}">`;
  }
  return html;
}

/* 停止 */
function stopReel(id){
  const reel = document.getElementById(id);
  const index = Math.floor(Math.random()*images.length);

  reel.innerHTML = `
    <div class="reel-inner">
      <img src="${images[index]}">
      <img src="${images[index]}">
      <img src="${images[index]}">
    </div>
  `;

  /* 全部止まったら解除 */
  if(id === "r3"){
    spinning = false;
  }
}
</script>

</body>
</html>
