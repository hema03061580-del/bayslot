<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  background: transparent;
  text-align: center;
}

.ui {
  position: relative;
  max-width: 900px;
  margin: 0 auto;
}

.bg {
  width: 100%;
}

/* ロゴ */
.logo {
  position: absolute;
  top: -10%;
  left: 50%;
  transform: translateX(-50%);
  width: 95%;
  max-width: 620px;
}

/* ✅ UI少し下げる */
.slot {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 8%;
}

/* リール */
.reel {
  width: 90px;
  height: 90px;
  overflow: hidden;
  background: white;
}

/* 中身 */
.reel-inner {
  display: flex;
  flex-direction: column;
}

/* ✅ サイズ少し小さく */
.reel-inner img {
  width: 60px;
  height: 60px;
  object-fit: contain;
  display: block;
  margin: 0 auto;
}

/* 回転 */
.spin {
  animation: spin 0.08s linear infinite;
}

@keyframes spin {
  0% { transform: translateY(0); }
  100% { transform: translateY(-60px); }
}

/* ボタン */
.spin-btn {
  position: absolute;
  top: 72%;
  left: 50%;
  transform: translateX(-50%);
  width: 55%;
}
</style>
</head>

<body>

<div class="ui">
  <img src="ui.png" class="bg">
  <img src="logo.png" class="logo">

  <div class="slot">
    <div class="reel"><div id="r1"></div></div>
    <div class="reel"><div id="r2"></div></div>
    <div class="reel"><div id="r3"></div></div>
  </div>

  <img src="button.png" class="spin-btn" onclick="spinSlot()">
</div>

<audio id="spinSE" src="spin_full.mp3"></audio>

<script>
const images = [
  "face1.png","face2.png","face3.png",
  "face4.png","face5.png","face6.png"
];

let spinning = false;

/* リール生成（高さ完全一致） */
function createReel(){
  let html = "";
  for(let i=0;i<12;i++){
    const rand = Math.floor(Math.random()*images.length);
    html += `<img src="${images[rand]}">`;
  }
  return html;
}

/* 初期表示（中央固定） */
["r1","r2","r3"].forEach(id=>{
  const reel = document.getElementById(id);
  const index = Math.floor(Math.random()*images.length);

  reel.innerHTML = `
    <div class="reel-inner" style="transform: translateY(-60px)">
      <img src="${images[index]}">
      <img src="${images[index]}">
      <img src="${images[index]}">
    </div>
  `;
});

/* 回す */
function spinSlot(){
  if(spinning) return;
  spinning = true;

  document.getElementById("spinSE").play();

  ["r1","r2","r3"].forEach(id=>{
    const reel = document.getElementById(id);

    reel.innerHTML = `
      <div class="reel-inner spin">
        ${createReel()}
      </div>
    `;
  });

  setTimeout(()=>stopReel("r1"), 3000);
  setTimeout(()=>stopReel("r2"), 3500);
  setTimeout(()=>stopReel("r3"), 4200);
}

/* 停止（中央ピタ止め） */
function stopReel(id){
  const reel = document.getElementById(id);
  const index = Math.floor(Math.random()*images.length);

  reel.innerHTML = `
    <div class="reel-inner" style="transform: translateY(-60px)">
      <img src="${images[index]}">
      <img src="${images[index]}">
      <img src="${images[index]}">
    </div>
  `;

  if(id === "r3"){
    spinning = false;
  }
}
</script>

</body>
</html>
