<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  background: transparent;
  text-align: center;
}

.ui {
  position: relative;
  max-width: 900px;
  margin: 0 auto;
}

.bg { width: 100%; }

/* ロゴ */
.logo {
  position: absolute;
  top: -8%;
  left: 50%;
  transform: translateX(-50%);
  width: 95%;
}

/* スロット */
.slot {
  position: absolute;
  top: 52%;
  left: 50%;
  transform: translate(-50%, -50%);
  display: flex;
  gap: 12px;
}

/* リール */
.reel {
  width: 80px;
  height: 80px;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}

.reel-inner {
  display: flex;
  flex-direction: column;
  align-items: center;
}

.reel-inner img {
  width: 56px;
  height: 56px;
}

/* 回転 */
.spin {
  animation: spin 0.08s linear infinite;
}

@keyframes spin {
  0% { transform: translateY(-56px); }
  100% { transform: translateY(-112px); }
}

/* ボタン */
.spin-btn {
  position: absolute;
  top: 78%;
  left: 50%;
  transform: translateX(-50%);
  width: 55%;
}

/* 紙吹雪 */
#confetti {
  position: absolute;
  top: 0;
  left: 0;
  pointer-events: none;
  z-index: 10; /* 🔥 重要 */
}
</style>
</head>

<body>

<div class="ui">
  <img src="ui.png" class="bg">
  <img src="logo.png" class="logo">

  <div class="slot">
    <div class="reel"><div id="r1"></div></div>
    <div class="reel"><div id="r2"></div></div>
    <div class="reel"><div id="r3"></div></div>
  </div>

  <img src="button.png" class="spin-btn" onclick="spinSlot()">

  <canvas id="confetti"></canvas>
</div>

<audio id="spinSE" src="spin_full.mp3"></audio>
<audio id="normalSE" src="normal.mp3"></audio>
<audio id="jackpotSE" src="jackpot.mp3"></audio>

<script>
const images = [
  "face1.png","face2.png","face3.png",
  "face4.png","face5.png","face6.png"
];

const jackpotIndex = 2;

let spinning = false;
let results = [];

/* 🔥 音ロック解除 */
function unlockAudio(){
  document.querySelectorAll("audio").forEach(a=>{
    a.play().catch(()=>{});
    a.pause();
    a.currentTime = 0;
  });
}
document.body.addEventListener("touchstart", unlockAudio, { once: true });

/* 🔥 SE（前の音止める） */
function playSE(id){
  document.querySelectorAll("audio").forEach(a=>{
    a.pause();
    a.currentTime = 0;
  });

  const audio = document.getElementById(id);
  audio.play().catch(()=>{});
}

/* リール生成 */
function createReel(){
  let html = "";
  for(let i=0;i<12;i++){
    html += `<img src="${images[Math.floor(Math.random()*images.length)]}">`;
  }
  return html;
}

/* 初期 */
["r1","r2","r3"].forEach(id=>{
  const index = Math.floor(Math.random()*images.length);

  document.getElementById(id).innerHTML = `
    <div class="reel-inner" style="transform: translateY(-56px)">
      <img src="${images[index]}">
      <img src="${images[index]}">
      <img src="${images[index]}">
    </div>
  `;
});

/* 回す */
function spinSlot(){
  if(spinning) return;
  spinning = true;
  results = [];

  playSE("spinSE");

  ["r1","r2","r3"].forEach(id=>{
    document.getElementById(id).innerHTML = `
      <div class="reel-inner spin">
        ${createReel()}
      </div>
    `;
  });

  setTimeout(()=>stopReel("r1"), 3000);
  setTimeout(()=>stopReel("r2"), 3500);
  setTimeout(()=>stopReel("r3"), 4200);
}

/* 停止 */
function stopReel(id){
  const index = Math.floor(Math.random()*images.length);
  results.push(index);

  document.getElementById(id).innerHTML = `
    <div class="reel-inner" style="transform: translateY(-56px)">
      <img src="${images[index]}">
      <img src="${images[index]}">
      <img src="${images[index]}">
    </div>
  `;

  if(results.length === 3){
    setTimeout(()=>{
      checkWin();
      spinning = false;
    },400);
  }
}

/* 判定 */
function checkWin(){
  if(results[0] === results[1] && results[1] === results[2]){

    if(results[0] === jackpotIndex){
      playSE("jackpotSE");
      showConfetti(180);
    } else {
      playSE("normalSE");
      showConfetti(80);
    }
  }
}

/* 🎉 紙吹雪（消える版） */
function showConfetti(amount){
  const canvas = document.getElementById("confetti");
  const ctx = canvas.getContext("2d");

  canvas.width = window.innerWidth;
  canvas.height = 200;

  let pieces = [];

  for(let i=0;i<amount;i++){
    pieces.push({
      x: Math.random()*canvas.width,
      y: Math.random()*canvas.height,
      size: Math.random()*6+4,
      speed: Math.random()*3+2
    });
  }

  let frame = 0;

  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    pieces.forEach(p=>{
      ctx.fillStyle = `hsl(${Math.random()*360},100%,50%)`;
      ctx.fillRect(p.x,p.y,p.size,p.size);
      p.y += p.speed;
    });

    frame++;

    if(frame < 60){
      requestAnimationFrame(draw);
    } else {
      ctx.clearRect(0,0,canvas.width,canvas.height); // 🔥 完全消去
    }
  }

  draw();
}
</script>

</body>
</html>
