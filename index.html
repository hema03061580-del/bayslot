<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  background: transparent;
  text-align: center;
}

.ui {
  position: relative;
  max-width: 900px;
  margin: 0 auto;
}

.bg {
  width: 100%;
}

/* ロゴ */
.logo {
  position: absolute;
  top: -12%;
  left: 50%;
  transform: translateX(-50%);
  width: 90%;
  max-width: 600px;
}

/* スロット */
.slot {
  position: absolute;
  top: 40%;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 8%;
}

/* リール */
.reel {
  width: 90px;
  height: 90px;
  overflow: hidden;
  background: white;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* 画像 */
.reel img {
  width: 70px;
  height: 70px;
  object-fit: contain;
}

/* 回転 */
.spin {
  animation: spin 0.1s linear infinite;
}

@keyframes spin {
  0% { transform: translateY(0); }
  100% { transform: translateY(-10px); }
}

/* ボタン */
.spin-btn {
  position: absolute;
  top: 68%;
  left: 50%;
  transform: translateX(-50%);
  width: 55%;
}
</style>
</head>

<body>

<div class="ui">
  <img src="ui.png" class="bg">
  <img src="logo.png" class="logo">

  <div class="slot">
    <div class="reel"><img id="r1"></div>
    <div class="reel"><img id="r2"></div>
    <div class="reel"><img id="r3"></div>
  </div>

  <img src="button.png" class="spin-btn" onclick="spinSlot()">
</div>

<audio id="spinSE" src="spin_full.mp3"></audio>

<script>
const images = [
  "face1.png","face2.png","face3.png",
  "face4.png","face5.png","face6.png"
];

let spinning = false;

/* 初期表示 */
["r1","r2","r3"].forEach(id=>{
  document.getElementById(id).src =
    images[Math.floor(Math.random()*images.length)];
});

/* 回す */
function spinSlot(){
  if(spinning) return;
  spinning = true;

  document.getElementById("spinSE").play();

  spinReel("r1",3000);
  spinReel("r2",3500);
  spinReel("r3",4200);
}

/* 個別回転 */
function spinReel(id, time){
  const img = document.getElementById(id);

  const interval = setInterval(()=>{
    img.src = images[Math.floor(Math.random()*images.length)];
  }, 100);

  setTimeout(()=>{
    clearInterval(interval);
    img.src = images[Math.floor(Math.random()*images.length)];

    if(id === "r3"){
      spinning = false;
    }
  }, time);
}
</script>

</body>
</html>
