<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  background: white;
  display: flex;
  justify-content: center;
}

.ui {
  position: relative;
  width: 100%;
  max-width: 500px;
  padding: 20px 0;
}

.bg { width: 100%; }

.logo {
  position: absolute;
  top: -10%;
  left: 50%;
  transform: translateX(-50%);
  width: 80%;
}

/* 🎯 スロット位置（ここ調整） */
.slot {
  position: absolute;
  top: 32%;
  left: 18%;
  width: 65%;
  height: 120px;   /* ←ここも同じ */
  display: flex;
  justify-content: space-between;
}

/* 🎯 リール */
.reel {
  width: 30%;
  height: 120px;   /* ←固定（超重要） */
  overflow: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* 🎯 中身 */
.reel-inner {
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* 🎯 画像 */
.reel-inner img {
  width: 100%;
  height: 120px;   /* ←リールと同じにする */
  object-fit: contain;
}

/* 🎯 回転 */
.reel-inner.spin {
  animation: spin 0.08s linear infinite;
}

@keyframes spin {
  0% { transform: translateY(0); }
  100% { transform: translateY(-100%); }
}

/* 🎯 ボタン */
.spin-btn {
  position: absolute;
  bottom: -90px;
  left: 50%;
  transform: translateX(-50%);
  width: 70%;
  max-width: 250px;
}

/* 🎉 紙吹雪 */
#confetti {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
}
</style>
</head>

<body>

<div class="ui">
  <img src="ui.png" class="bg">
  <img src="logo.png" class="logo">

  <div class="slot">
    <div class="reel"><div id="r1"></div></div>
    <div class="reel"><div id="r2"></div></div>
    <div class="reel"><div id="r3"></div></div>
  </div>

  <img src="button.png" class="spin-btn" onclick="spinSlot()">

  <canvas id="confetti"></canvas>
</div>

<!-- 🎵 音 -->
<audio id="spinFull" src="spin_full.mp3" preload="auto"></audio>
<audio id="bgm1" src="bgm1.mp3" preload="auto"></audio>
<audio id="bgm2" src="bgm2.mp3" preload="auto"></audio>

<script>
const images = [
  "face1.png","face2.png","face3.png",
  "face4.png","face5.png","face6.png"
];

const jackpotIndex = 2;

let spinning = false;
let resultType = "";
let fixedIndex = 0;

/* 🔓 音解放（スマホ） */
function unlockAudio(){
  document.querySelectorAll("audio").forEach(a=>{
    a.play().catch(()=>{});
    a.pause();
    a.currentTime = 0;
  });
}
document.body.addEventListener("touchstart", unlockAudio, { once: true });

/* 🎰 リール生成 */
function createReel(){
  let html = "";
  for(let i=0;i<12;i++){
    html += `<img src="${images[Math.floor(Math.random()*images.length)]}">`;
  }
  return html;
}

/* 初期表示 */
["r1","r2","r3"].forEach(id=>{
  document.getElementById(id).innerHTML =
    `<div class="reel-inner">${createReel()}</div>`;
});

/* 🎰 回転 */
function spinSlot(){

  if(spinning) return;
  spinning = true;

  /* 🎵 音（即再生） */
  const audio = document.getElementById("spinFull");
  audio.currentTime = 0;
  audio.play().catch(()=>{});

  /* 抽選 */
  let rand = Math.random();

  if(rand < 0.04){
    resultType = "jackpot";
    fixedIndex = jackpotIndex;
  }
  else if(rand < 0.12){
    resultType = "normal";
    fixedIndex = Math.floor(Math.random()*images.length);

    if(fixedIndex === jackpotIndex){
      fixedIndex = (fixedIndex + 1) % images.length;
    }
  }
  else{
    resultType = "lose";
  }

  /* 回転開始 */
  setTimeout(()=>{
    ["r1","r2","r3"].forEach(id=>{
      const reel = document.getElementById(id);
      reel.innerHTML = `<div class="reel-inner spin">${createReel()}</div>`;
    });
  },230);

  /* 停止 */
  setTimeout(()=>stopReel("r1"), 3000);
  setTimeout(()=>stopReel("r2"), 3500);
  setTimeout(()=>stopReel("r3"), 4200);

  setTimeout(()=>{
    checkWin();
    spinning = false;
  },5200);
}

/* 🛑 停止 */
function stopReel(id){
  const reel = document.getElementById(id);

  let index = (resultType === "lose")
    ? Math.floor(Math.random()*images.length)
    : fixedIndex;

  reel.innerHTML = `
    <div class="reel-inner">
      <img src="${images[index]}">
      <img src="${images[index]}">
      <img src="${images[index]}">
    </div>
  `;
}

/* 🎉 紙吹雪 */
function showConfetti(duration){
  const canvas = document.getElementById("confetti");
  const ctx = canvas.getContext("2d");

  canvas.width = canvas.offsetWidth;
  canvas.height = canvas.offsetHeight;

  let pieces = [];

  for(let i=0;i<80;i++){
    pieces.push({
      x: Math.random()*canvas.width,
      y: Math.random()*canvas.height,
      size: Math.random()*6+4,
      speed: Math.random()*3+2
    });
  }

  let frame = 0;

  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    pieces.forEach(p=>{
      ctx.fillStyle = `hsl(${Math.random()*360},100%,50%)`;
      ctx.fillRect(p.x,p.y,p.size,p.size);
      p.y += p.speed;
    });

    frame++;
    if(frame < duration){
      requestAnimationFrame(draw);
    } else {
      ctx.clearRect(0,0,canvas.width,canvas.height);
    }
  }

  draw();
}

/* 🎯 判定 */
function checkWin(){

  if(resultType === "jackpot"){
    showConfetti(180);
    setTimeout(()=>document.getElementById("bgm2").play(),200);
  }
  else if(resultType === "normal"){
    showConfetti(60);
    setTimeout(()=>document.getElementById("bgm1").play(),200);
  }
}
</script>

</body>
</html>
