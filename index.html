<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  background: transparent;
  text-align: center;
}

/* 全体 */
.ui {
  position: relative;
  width: 100%;
  max-width: 900px;
  margin: 0 auto;
}

.bg {
  width: 100%;
}

/* ✅ ロゴ（さらに上） */
.logo {
  position: absolute;
  top: -6%;
  left: 50%;
  transform: translateX(-50%);
  width: 65%;
  max-width: 420px;
  z-index: 2;
}

/* スロット */
.slot {
  position: absolute;
  top: 38%;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 8%;
}

/* ✅ リール（少し小さく） */
.reel {
  width: 120px;
  height: 100px;
  overflow: hidden;
  background: white;

  display: flex;
  align-items: center;
  justify-content: center;
}

/* 中身 */
.reel-inner {
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* ✅ 画像（小さく統一） */
.reel-inner img {
  width: 100px;
  height: 100px;
  object-fit: contain;
}

/* 回転 */
.spin {
  animation: spin 0.1s linear infinite;
}

@keyframes spin {
  0% { transform: translateY(0); }
  100% { transform: translateY(-100px); }
}

/* ボタン */
.spin-btn {
  position: absolute;
  top: 65%;
  left: 50%;
  transform: translateX(-50%);
  width: 55%;
  max-width: 320px;
}
</style>
</head>

<body>

<div class="ui">
  <img src="ui.png" class="bg">
  <img src="logo.png" class="logo">

  <div class="slot">
    <div class="reel"><div id="r1"></div></div>
    <div class="reel"><div id="r2"></div></div>
    <div class="reel"><div id="r3"></div></div>
  </div>

  <img src="button.png" class="spin-btn" onclick="spinSlot()">
</div>

<audio id="spinSE" src="spin_full.mp3"></audio>

<script>
const images = [
  "face1.png","face2.png","face3.png",
  "face4.png","face5.png","face6.png"
];

let spinning = false;
let results = [];

/* 初期表示 */
["r1","r2","r3"].forEach(id=>{
  const reel = document.getElementById(id);
  const index = Math.floor(Math.random()*images.length);

  reel.innerHTML = `
    <div class="reel-inner">
      <img src="${images[index]}">
      <img src="${images[index]}">
      <img src="${images[index]}">
    </div>
  `;
});

/* 回す */
function spinSlot(){
  if(spinning) return;
  spinning = true;
  results = [];

  document.getElementById("spinSE").play();

  ["r1","r2","r3"].forEach(id=>{
    const reel = document.getElementById(id);

    reel.innerHTML = `
      <div class="reel-inner">
        ${createReel()}
      </div>
    `;

    reel.querySelector(".reel-inner").classList.add("spin");
  });

  /* ✅ 順番停止復活 */
  setTimeout(()=>stopReel("r1"), 3000);
  setTimeout(()=>stopReel("r2"), 3500);
  setTimeout(()=>stopReel("r3"), 4200);
}

/* リール生成 */
function createReel(){
  let html = "";
  for(let i=0;i<10;i++){
    const rand = Math.floor(Math.random()*images.length);
    html += `<img src="${images[rand]}">`;
  }
  return html;
}

/* 停止 */
function stopReel(id){
  const reel = document.getElementById(id);
  const inner = reel.querySelector(".reel-inner");

  inner.classList.remove("spin");

  const index = Math.floor(Math.random()*images.length);
  results.push(index);

  reel.innerHTML = `
    <div class="reel-inner">
      <img src="${images[index]}">
      <img src="${images[index]}">
      <img src="${images[index]}">
    </div>
  `;

  if(results.length === 3){
    spinning = false;
  }
}
</script>

</body>
</html>
